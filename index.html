<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->

    <header>

        <div class="header-top">
            <h1>CareerTrack 🚀</h1>

            <button class="dark-btn" onclick="toggleDarkMode()">
                🌙 Dark Mode
            </button>
        </div>

        <p>Track Your Internship Journey</p>

    </header>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card">
            <h2 id="total">0</h2>
            <p>Total Applications</p>
        </div>

        <div class="card">
            <h2 id="applied">0</h2>
            <p>Applied</p>
        </div>

        <div class="card">
            <h2 id="interview">0</h2>
            <p>Interview</p>
        </div>

        <div class="card">
            <h2 id="selected">0</h2>
            <p>Selected</p>
        </div>

        <div class="card">
            <h2 id="successRate">0%</h2>
            <p>Success Rate</p>
        </div>

    </section>

    <!-- Search & Filter -->

    <section class="controls">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Company..."
            onkeyup="searchApplications()">

        <select
            id="filterStatus"
            onchange="filterApplications()">

            <option value="All">All Status</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Selected">Selected</option>
            <option value="Rejected">Rejected</option>

        </select>

    </section>

    <!-- Add Application -->

    <section class="form-section">

        <h2>Add Application</h2>

        <input
            type="text"
            id="company"
            placeholder="Company Name">

        <input
            type="text"
            id="role"
            placeholder="Role">

        <input
            type="date"
            id="deadline">

        <textarea
            id="notes"
            placeholder="Notes about interview, preparation, company..."
        ></textarea>

        <select id="status">

            <option value="Applied">Applied</option>

            <option value="Interview">Interview</option>

            <option value="Selected">Selected</option>

            <option value="Rejected">Rejected</option>

        </select>

        <button onclick="addApplication()">
            Add Application
        </button>

    </section>

    <!-- Applications -->

    <section>

        <h2 class="title">
            Applications
        </h2>

        <div id="applicationList"></div>

    </section>

    <script src="script.js"></script>

</body>
</html>
